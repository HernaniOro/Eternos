<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'>
  <!-- Fundo escuro -->
  <rect width='512' height='512' rx='100' fill='#111111'/>

  <!-- Letra E (traço bold, fonte geométrica) -->
  <!-- Barra vertical esquerda -->
  <rect x='148' y='140' width='52' height='232' rx='8' fill='#f5f0e8'/>
  <!-- Barra superior -->
  <rect x='148' y='140' width='200' height='52' rx='8' fill='#f5f0e8'/>
  <!-- Barra do meio -->
  <rect x='148' y='230' width='168' height='52' rx='8' fill='#f5f0e8'/>
  <!-- Barra inferior -->
  <rect x='148' y='320' width='200' height='52' rx='8' fill='#f5f0e8'/>

  <!-- Cruz pequena — centralizada no quadrante superior direito do E -->
  <!-- Barra horizontal da cruz -->
  <rect x='310' y='108' width='68' height='18' rx='6' fill='#d97706'/>
  <!-- Barra vertical da cruz -->
  <rect x='341' y='80' width='18' height='72' rx='6' fill='#d97706'/>
</svg>
