<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'>
  <defs>
    <!-- Fundo escuro com gradiente radial sutil -->
    <radialGradient id="bg" cx="38%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#282828"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </radialGradient>

    <!-- Dourado com variação de tom para simular textura -->
    <linearGradient id="gold" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#e8c04a"/>
      <stop offset="20%"  stop-color="#f5d06a"/>
      <stop offset="42%"  stop-color="#c8960c"/>
      <stop offset="58%"  stop-color="#e0b030"/>
      <stop offset="75%"  stop-color="#b87a08"/>
      <stop offset="100%" stop-color="#d4a020"/>
    </linearGradient>

    <!-- Sombra suave para a letra E -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="3" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <!-- Brilho leve sobre a cruz -->
    <filter id="crossShine" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="-2" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width='512' height='512' rx='96' fill='url(#bg)'/>

  <!-- Letra E — serif, branca, grande, com sombra -->
  <text
    x='258'
    y='418'
    text-anchor='middle'
    font-family='Georgia, "Times New Roman", serif'
    font-weight='bold'
    font-size='490'
    letter-spacing='-8'
    fill='white'
    filter='url(#shadow)'
  >E</text>

  <!-- Cruz dourada — centrada no ícone -->
  <!-- Barra vertical: de y=44 até y=468 -->
  <rect x='224' y='44' width='64' height='424' rx='4' fill='url(#gold)' filter='url(#crossShine)'/>
  <!-- Barra horizontal: de x=82 até x=430, centrada em y=196 -->
  <rect x='82' y='164' width='348' height='64' rx='4' fill='url(#gold)' filter='url(#crossShine)'/>
</svg>
